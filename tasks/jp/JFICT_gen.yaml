dataset_name: default
dataset_path: TheFinAI/JF-ICR
output_type: generate_until
doc_to_target: '{{answer}}'
doc_to_text: '{{query}}'
fewshot_split: test
should_decontaminate: true
doc_to_decontamination_query: "{{query}}"
generation_kwargs:
  until:
    - "@@"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 512
filter_list:
  - name: "score-first"
    filter:
      - function: "regex"
        regex_pattern: '([+\-][012]|0)'
      - function: "take_first"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: '1.0'
task: JFICR_gen
tag: jp_new
test_split: test
